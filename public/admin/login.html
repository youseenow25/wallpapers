<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — WALLVAULT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="login-page">
  <div class="login-wrap">
    <a href="/" class="back-link">← Back to Store</a>
    <div class="login-box">
      <div class="login-logo">outbbo</div>
      <p class="login-sub">Admin Panel</p>
      <form id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" required autofocus autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
        </div>
        <p class="login-error" id="loginError"></p>
        <button type="submit" class="a-btn-primary">Sign In →</button>
      </form>
    </div>
  </div>

  <script>
    if (localStorage.getItem('wv-admin-token')) location.href = '/admin/index.html';

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const err = document.getElementById('loginError');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      btn.disabled = true; btn.textContent = 'Signing in…';
      err.textContent = '';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('wv-admin-token', data.token);
        location.href = '/admin/index.html';
      } catch (ex) {
        err.textContent = ex.message;
        btn.disabled = false; btn.textContent = 'Sign In →';
      }
    });
  </script>
</body>
</html>
